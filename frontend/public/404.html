<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Pronostico 2026</title>
  <script>
    // GitHub Pages SPA redirect: preserves the route path on 404
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1).join('/') +
      '/?p=' + l.pathname.slice(1).replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
