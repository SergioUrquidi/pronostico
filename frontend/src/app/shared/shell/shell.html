<div class="shell">
  <header class="topbar">
    <div class="brand">⚽ <span>Mundial 2026</span></div>
    <div class="user">
      <span>{{ auth.user()?.displayName }}</span>
      <button class="link-btn" (click)="logout()">Salir</button>
    </div>
  </header>

  <main class="content">
    <router-outlet />
  </main>

  <nav class="bottom-nav">
    <a routerLink="/predicciones" routerLinkActive="active">
      <span class="icon">✏️</span>
      <span>Pronósticos</span>
    </a>
    <a routerLink="/partidos" routerLinkActive="active">
      <span class="icon">📋</span>
      <span>Partidos</span>
    </a>
    <a routerLink="/tabla" routerLinkActive="active">
      <span class="icon">🏆</span>
      <span>Tabla</span>
    </a>
    @if (auth.isAdmin()) {
      <a routerLink="/admin" routerLinkActive="active">
        <span class="icon">⚙️</span>
        <span>Admin</span>
      </a>
    }
  </nav>
</div>
