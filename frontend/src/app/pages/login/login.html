<div class="login-wrap">
  <div class="card login-card">
    <div class="logo">⚽</div>
    <h1>Mundial 2026</h1>
    <p class="tag">Pronosticos Primos</p>

    <form (ngSubmit)="submit()" #f="ngForm">
      <label class="field-label">Usuario</label>
      <input
        class="input"
        name="username"
        [ngModel]="username()"
        (ngModelChange)="username.set($event)"
        placeholder="marco, sergio, cesar..."
        autocomplete="username"
        required
      />

      <label class="field-label">Clave</label>
      <input
        class="input"
        type="password"
        name="password"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
        placeholder="123456"
        autocomplete="current-password"
        required
      />

      @if (error()) {
        <div class="error">{{ error() }}</div>
      }
      @if (countdown() > 0) {
        <div class="waking">⏳ Servidor despertando... reintentando en {{ countdown() }}s</div>
      }

      <button class="btn" type="submit" [disabled]="loading() || f.invalid">
        @if (countdown() > 0) {
          Reintentando en {{ countdown() }}s...
        } @else {
          {{ loading() ? 'Ingresando...' : 'Ingresar' }}
        }
      </button>
    </form>
  </div>
</div>
