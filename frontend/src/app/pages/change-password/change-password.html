<div class="login-wrap">
  <div class="card login-card">
    <h1>Cambiá tu clave</h1>
    <p class="tag">Primer ingreso: clave por defecto 123456</p>

    <form (ngSubmit)="submit()" #f="ngForm">
      <label class="field-label">Clave actual</label>
      <input
        class="input"
        type="password"
        name="currentPassword"
        [ngModel]="currentPassword()"
        (ngModelChange)="currentPassword.set($event)"
        required
      />

      <label class="field-label">Clave nueva</label>
      <input
        class="input"
        type="password"
        name="newPassword"
        [ngModel]="newPassword()"
        (ngModelChange)="newPassword.set($event)"
        required
      />

      <label class="field-label">Repetir clave nueva</label>
      <input
        class="input"
        type="password"
        name="confirmPassword"
        [ngModel]="confirmPassword()"
        (ngModelChange)="confirmPassword.set($event)"
        required
      />

      @if (error()) {
        <div class="error">{{ error() }}</div>
      }

      <button class="btn" type="submit" [disabled]="loading() || f.invalid">
        {{ loading() ? 'Guardando...' : 'Guardar y continuar' }}
      </button>
    </form>
  </div>
</div>
