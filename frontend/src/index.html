<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Frontend</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <script>
    // GitHub Pages SPA: decode the redirect from 404.html
    (function () {
      var q = window.location.search;
      if (q && q[1] === 'p') {
        var parts = q.slice(1).split('&').reduce(function (acc, p) {
          var kv = p.split('=');
          acc[kv[0]] = kv.slice(1).join('=').replace(/~and~/g, '&');
          return acc;
        }, {});
        if (parts.p) {
          window.history.replaceState(
            null, null,
            '/' + parts.p + (parts.q ? '?' + parts.q : '') + window.location.hash
          );
        }
      }
    })();
  </script>
  <app-root></app-root>
</body>
</html>
